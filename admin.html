<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>双语翻译 · 智能客服</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-title h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 6px; }
        .header-title p { font-size: 0.7rem; opacity: 0.9; margin-top: 2px; }
        .status-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-open { background: #34c759; }
        .status-closed { background: #ff3b30; }
        
        /* 双语标识 */
        .lang-bar {
            background: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5e5;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .lang-you { color: #667eea; }
        .lang-client { color: #f59e0b; }
        
        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f7fb;
        }
        
        /* 消息气泡 */
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 我方消息（中文）- 蓝色 */
        .message.sent { align-self: flex-end; }
        .message.sent .bubble {
            background: linear-gradient(135deg, #667eea 0%, #5a67d8 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        /* 对方消息（西班牙语）- 橙色 */
        .message.received { align-self: flex-start; }
        .message.received .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e5e5e5;
        }
        
        .bubble {
            padding: 14px 18px;
            border-radius: 24px;
            word-wrap: break-word;
        }
        
        /* 发送者名称 */
        .sender-name {
            font-size: 0.65rem;
            margin-bottom: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sent .sender-name { justify-content: flex-end; color: rgba(255,255,255,0.8); }
        .received .sender-name { color: #f59e0b; }
        
        /* 主要文字 - 放大突出 */
        .main-text {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        /* 翻译文字 - 双语显示 */
        .translated-text {
            font-size: 0.85rem;
            padding-top: 8px;
            margin-top: 6px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sent .translated-text { border-top-color: rgba(255,255,255,0.3); }
        .translated-label {
            font-size: 0.6rem;
            font-weight: 600;
            opacity: 0.7;
        }
        .translated-content {
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .timestamp {
            font-size: 0.55rem;
            opacity: 0.5;
            margin-top: 6px;
            text-align: right;
        }
        
        /* 输入区域 */
        .input-area {
            background: white;
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f5f7fb;
            border-radius: 30px;
            padding: 4px 8px 4px 16px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        .send-btn {
            background: #667eea;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .mic-btn {
            background: #f0f0f0;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mic-btn.recording {
            background: #ff3b30;
            color: white;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .tts-btn {
            background: #f0f0f0;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        /* 系统消息 */
        .system-message {
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            margin: 8px 0;
        }
        
        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .main-text { font-size: 1rem; }
            .input-area { padding: 10px 12px; }
            .input-wrapper { padding: 2px 6px 2px 12px; }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-title">
            <h1>🌐 双语翻译 · 客服咨询</h1>
            <p>中文 ↔ Español 实时互译</p>
        </div>
        <div id="roomStatusBadge" class="status-badge status-closed">⏳ 连接中</div>
    </div>
    
    <div class="lang-bar">
        <span class="lang-you">🇨🇳 你说中文 → 客服看到 Español</span>
        <span class="lang-client">🇪🇸 客服说 Español → 你看到 中文</span>
    </div>
    
    <div class="messages-area" id="messagesArea">
        <div class="system-message">⏳ 正在连接...</div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="✏️ 输入中文，自动翻译为 Español..." disabled>
            <button id="sendBtn" class="send-btn" disabled>📤</button>
        </div>
        <button id="voiceBtn" class="mic-btn" disabled>🎙️</button>
        <button id="ttsBtn" class="tts-btn">🔊</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "您的API_KEY",
        authDomain: "您的项目ID.firebaseapp.com",
        projectId: "您的项目ID",
        storageBucket: "您的项目ID.appspot.com",
        messagingSenderId: "您的发送者ID",
        appId: "您的APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentRoom = null;
    let currentUserId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
    let isRoomOpen = false;
    let unsubscribe = null;
    
    // 从 URL 获取房间号
    currentRoom = window.location.hash.substring(1);
    
    // ========== 翻译 API ==========
    const MY_MEMORY_API = "https://api.mymemory.translated.net/get";
    
    async function translateText(text, sourceLang, targetLang) {
        if (!text.trim()) return text;
        try {
            const url = `${MY_MEMORY_API}?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
            const response = await fetch(url);
            const data = await response.json();
            let translated = data.responseData?.translatedText;
            if (translated) return translated.replace(/\[[a-z]{2}\]/gi, '').trim();
            return text;
        } catch (e) {
            return text;
        }
    }
    
    // ========== 添加消息到界面（双语突出显示） ==========
    function addMessage(senderId, originalText, translatedText, isFromMe, timestamp) {
        const container = document.getElementById('messagesArea');
        
        // 移除系统消息占位
        if (container.children.length === 1 && container.children[0].classList?.contains('system-message')) {
            container.innerHTML = '';
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isFromMe ? 'sent' : 'received'}`;
        const timeStr = timestamp ? new Date(timestamp.toDate()).toLocaleTimeString() : new Date().toLocaleTimeString();
        
        if (isFromMe) {
            // 我方发送：中文原文 + 西班牙语翻译
            messageDiv.innerHTML = `
                <div class="bubble">
                    <div class="sender-name">
                        <span>🇨🇳 你 (中文)</span>
                    </div>
                    <div class="main-text">${escapeHtml(originalText)}</div>
                    <div class="translated-text">
                        <span class="translated-label">📤 客服看到 (Español):</span>
                        <span class="translated-content">${escapeHtml(translatedText)}</span>
                    </div>
                    <div class="timestamp">${timeStr}</div>
                </div>
            `;
        } else {
            // 对方发送：西班牙语原文 + 中文翻译（突出显示）
            messageDiv.innerHTML = `
                <div class="bubble">
                    <div class="sender-name">
                        <span>🇪🇸 客服 (Español)</span>
                    </div>
                    <div class="main-text">${escapeHtml(originalText)}</div>
                    <div class="translated-text">
                        <span class="translated-label">📖 中文翻译 (你看到的):</span>
                        <span class="translated-content" style="font-size:1rem; font-weight:600; color:#f59e0b;">${escapeHtml(translatedText)}</span>
                    </div>
                    <div class="timestamp">${timeStr}</div>
                </div>
            `;
        }
        
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function addSystemMessage(text, isError = false) {
        const container = document.getElementById('messagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'system-message';
        msgDiv.style.color = isError ? '#ff3b30' : '#999';
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // ========== 发送消息 ==========
    async function sendMessage(chineseText) {
        if (!isRoomOpen) {
            addSystemMessage("🔒 客服暂未开启对话，请稍后再试", true);
            return;
        }
        if (!chineseText.trim()) return;
        
        const spanishTrans = await translateText(chineseText, "zh", "es");
        
        await db.collection("customerRooms").doc(currentRoom).collection("messages").add({
            senderId: currentUserId,
            originalText: chineseText,
            translatedText: spanishTrans,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    
    // ========== 监听消息 ==========
    function listenMessages() {
        if (unsubscribe) unsubscribe();
        const messagesRef = db.collection("customerRooms").doc(currentRoom).collection("messages");
        unsubscribe = messagesRef.orderBy("timestamp", "asc").onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && change.doc.data().senderId) {
                    const data = change.doc.data();
                    const isFromMe = data.senderId === currentUserId;
                    addMessage(data.senderId, data.originalText, data.translatedText, isFromMe, data.timestamp);
                }
            });
        });
    }
    
    // ========== 监听房间状态 ==========
    function listenRoomStatus() {
        return db.collection("customerRooms").doc(currentRoom).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                isRoomOpen = data.isOpen || false;
                updateUI();
                
                if (isRoomOpen) {
                    addSystemMessage("✅ 客服已开启对话，您可以发送消息了");
                } else {
                    addSystemMessage("🔒 客服暂未开启对话，请等待", true);
                }
            } else {
                addSystemMessage("❌ 房间不存在或链接无效", true);
                disableInputs();
            }
        });
    }
    
    function updateUI() {
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const statusBadge = document.getElementById('roomStatusBadge');
        
        if (isRoomOpen) {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            voiceBtn.disabled = false;
            statusBadge.innerText = "🟢 对话已开启";
            statusBadge.classList.remove('status-closed');
            statusBadge.classList.add('status-open');
        } else {
            disableInputs();
            statusBadge.innerText = "🔴 等待开启";
            statusBadge.classList.remove('status-open');
            statusBadge.classList.add('status-closed');
        }
    }
    
    function disableInputs() {
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('messageInput').disabled = true;
        document.getElementById('voiceBtn').disabled = true;
    }
    
    // ========== 语音识别（手机端兼容） ==========
    let recognition = null;
    let isListening = false;
    
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            console.log("不支持语音识别");
            document.getElementById('voiceBtn').style.opacity = '0.5';
            document.getElementById('voiceBtn').disabled = true;
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'zh-CN';
        
        recognition.onstart = () => {
            isListening = true;
            document.getElementById('voiceBtn').classList.add('recording');
            addSystemMessage("🎙️ 请说话...");
        };
        
        recognition.onend = () => {
            isListening = false;
            document.getElementById('voiceBtn').classList.remove('recording');
        };
        
        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            addSystemMessage(`🎤 识别: "${text}"`);
            await sendMessage(text);
        };
        
        recognition.onerror = (event) => {
            console.error("语音错误:", event.error);
            addSystemMessage(`❌ 语音识别失败: ${event.error}`, true);
            document.getElementById('voiceBtn').classList.remove('recording');
            isListening = false;
        };
        
        document.getElementById('voiceBtn').onclick = () => {
            if (!isRoomOpen) {
                addSystemMessage("客服暂未开启对话", true);
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    addSystemMessage("请授予麦克风权限", true);
                }
            }
        };
    }
    
    // ========== 语音朗读 ==========
    let ttsEnabled = true;
    function initTTS() {
        const ttsBtn = document.getElementById('ttsBtn');
        ttsBtn.onclick = () => {
            ttsEnabled = !ttsEnabled;
            ttsBtn.innerText = ttsEnabled ? '🔊' : '🔇';
            if (!ttsEnabled) window.speechSynthesis.cancel();
        };
    }
    
    // 重写 addMessage 加入朗读功能（对方发来的消息朗读中文翻译）
    const originalAddMessage = addMessage;
    window.addMessage = function(senderId, originalText, translatedText, isFromMe, timestamp) {
        originalAddMessage(senderId, originalText, translatedText, isFromMe, timestamp);
        if (!isFromMe && ttsEnabled && translatedText) {
            const utterance = new SpeechSynthesisUtterance(translatedText);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    };
    addMessage = window.addMessage;
    
    // ========== 初始化 ==========
    async function init() {
        if (!currentRoom) {
            addSystemMessage("❌ 无效链接，请使用客服发给您的完整链接", true);
            disableInputs();
            return;
        }
        
        addSystemMessage(`🔍 正在连接房间...`);
        
        // 检查房间是否存在
        const doc = await db.collection("customerRooms").doc(currentRoom).get();
        if (!doc.exists) {
            addSystemMessage(`❌ 房间不存在或链接已失效`, true);
            addSystemMessage(`💡 请使用客服发给您的专属链接`, true);
            disableInputs();
            return;
        }
        
        addSystemMessage(`✅ 已连接到「${doc.data().clientName || '客服'}」`);
        listenRoomStatus();
        listenMessages();
        initSpeechRecognition();
        initTTS();
    }
    
    // 发送按钮
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('messageInput').value.trim();
        if (text) {
            await sendMessage(text);
            document.getElementById('messageInput').value = '';
        }
    };
    
    document.getElementById('messageInput').onkeypress = (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    };
    
    init();
</script>
</body>
</html>
