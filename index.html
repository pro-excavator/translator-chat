<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#1a1a2e;--accent:#4f8ef7;--green:#22c27a;--wa:#25D366;
  --surface:#f7f8fc;--card:#fff;--border:rgba(0,0,0,.08);
  --text:#111827;--muted:#6b7280;--r:18px;--rs:10px;
  --bubble-admin:#4f8ef7;--bubble-client:#22c27a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--surface);color:var(--text);min-height:100vh}

/* NAV */
.tabs{display:flex;background:var(--brand);padding:0 4px;position:sticky;top:0;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 2px 8px;color:rgba(255,255,255,.4);font-size:10px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab svg{width:21px;height:21px}
.tab.active{color:#fff;border-color:var(--accent)}

/* PAGES */
.page{display:none;padding:14px;max-width:600px;margin:0 auto}
.page.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* FORM */
input,textarea,select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:.15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(79,142,247,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
.field{margin-bottom:12px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border:none;border-radius:30px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-blue{background:var(--accent);color:#fff}
.btn-wa{background:var(--wa);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-red{background:#fee2e2;color:#991b1b}
.btn-sm{padding:8px 15px;font-size:13px;width:auto;border-radius:20px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:80px}

/* TEMPLATE GRID */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tpl-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px;cursor:pointer;transition:.15s;position:relative}
.tpl-card:hover,.tpl-card.sel{border-color:var(--accent);background:#eef4ff}
.tpl-card.sel{box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.tpl-icon{font-size:20px;margin-bottom:5px}
.tpl-name{font-size:13px;font-weight:600;margin-bottom:2px}
.tpl-desc{font-size:11px;color:var(--muted)}
.tpl-edit{position:absolute;top:7px;right:7px;display:none;background:rgba(79,142,247,.12);border:none;color:var(--accent);font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer}
.tpl-card:hover .tpl-edit{display:block}

/* WA PREVIEW */
.wa-mock{background:#e5ddd5;border-radius:14px;padding:14px}
.wa-header{background:#075e54;color:#fff;border-radius:10px 10px 0 0;padding:11px 14px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.wa-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:15px}
.wa-bubble{background:#dcf8c6;border-radius:4px 14px 14px 14px;padding:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;color:#111;position:relative;margin-top:10px}
.wa-bubble::before{content:'';position:absolute;top:0;left:-7px;border:7px solid transparent;border-right-color:#dcf8c6;border-top:0;border-left:0}
.wa-time{font-size:11px;color:var(--muted);text-align:right;margin-top:3px}
.zh-ref{background:#eef4ff;border:1px dashed var(--accent);border-radius:10px;padding:10px;margin-top:10px;font-size:12px;color:#1d4ed8;line-height:1.6;white-space:pre-wrap}
.zh-ref-label{font-size:10px;font-weight:600;color:var(--accent);margin-bottom:3px}

/* LANG ROW — 支持多语言选择 */
.lang-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.lang-badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.lang-badge:hover{border-color:var(--accent)}
.lang-select{flex:1;min-width:100px;padding:6px 10px;font-size:13px;border-radius:20px}
.swap-btn{background:var(--card);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* TRANS OUTPUT */
.trans-out{background:var(--surface);border-radius:var(--rs);border:1px solid var(--border);padding:13px;min-height:70px;font-size:15px;line-height:1.7}
.trans-actions{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}

/* PHRASES */
.phrases-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.phrase-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:.15s;position:relative}
.phrase-card:hover{border-color:var(--accent);background:#eef4ff}
.phrase-zh{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.phrase-es{font-size:11px;color:var(--muted)}
.phrase-del{position:absolute;top:5px;right:5px;display:none;background:none;border:none;color:#dc2626;font-size:12px;cursor:pointer;padding:2px}
.phrase-card:hover .phrase-del{display:block}
.phrase-speak{font-size:10px;opacity:.5;margin-left:3px;cursor:pointer}

/* ROOMS */
.room-item{background:var(--surface);border-radius:14px;padding:13px;margin-bottom:8px;border:1px solid var(--border)}
.room-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.room-name{font-weight:600;font-size:15px}
.toggle-pill{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.pill{width:42px;height:22px;background:#ccc;border-radius:20px;position:relative;transition:.2s}
.pill.on{background:var(--green)}
.pill::after{content:'';width:17px;height:17px;background:#fff;border-radius:50%;position:absolute;top:2.5px;left:3px;transition:.2s}
.pill.on::after{left:22px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-on{background:#d1fae5;color:#065f46}
.badge-off{background:#fee2e2;color:#991b1b}
.room-link{font-family:monospace;font-size:11px;color:var(--muted);background:var(--card);padding:7px 9px;border-radius:8px;border:1px solid var(--border);word-break:break-all;margin:7px 0}
.room-acts{display:flex;gap:7px;flex-wrap:wrap}

/* CHAT */
.msg-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
.msg{max-width:82%}
.msg.me{align-self:flex-end}
.msg.them{align-self:flex-start}
.me .bubble{background:var(--bubble-admin);color:#fff;border-radius:18px 18px 4px 18px}
.them .bubble{background:var(--bubble-client);color:#fff;border-radius:18px 18px 18px 4px}
.bubble{padding:10px 13px;font-size:14px;line-height:1.6}
.b-sender{font-size:10px;opacity:.75;margin-bottom:3px;font-weight:600}
.b-text{font-size:14px;cursor:pointer}
.b-trans{font-size:12px;margin-top:5px;padding-top:5px;border-top:1px dashed rgba(255,255,255,.4);opacity:.9;font-style:italic;cursor:pointer}
.b-time{font-size:10px;opacity:.5;margin-top:3px;text-align:right}
.b-img{max-width:100%;border-radius:10px;margin-top:6px;cursor:pointer}
.sys-msg{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}

/* CHAT LAYOUT */
.chat-wrap{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}
.chat-hdr{background:var(--brand);color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-hdr-close{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px}
.chat-hdr-right{display:flex;gap:8px;align-items:center}
.export-btn{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.8);padding:5px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:500}

/* ADMIN INPUT */
.admin-input-wrap{background:var(--card);padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0}
.admin-preview{font-size:12px;color:var(--muted);background:#eef4ff;border-radius:8px;padding:6px 10px;margin-bottom:6px;display:none;line-height:1.5}
.admin-preview-lbl{font-size:10px;font-weight:600;color:var(--accent);margin-bottom:2px}
.admin-input-row{display:flex;gap:6px;align-items:center}
.admin-input-row input{border-radius:30px;flex:1;min-width:0}

/* CLIENT INPUT */
.client-input-wrap{background:var(--card);padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0}
.client-input-wrap input{border-radius:30px;flex:1;min-width:0}

/* MIC & SEND */
.icon-btn{border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
.send-btn{background:var(--accent);color:#fff}
.img-btn{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.dual-mic{display:flex;gap:4px;flex-shrink:0}
.dual-mic-btn{display:flex;align-items:center;gap:4px;padding:6px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:.15s}
.dual-mic-btn:hover{border-color:var(--accent);background:#eef4ff}
.dual-mic-btn.rec{background:#fee2e2;color:#dc2626;border-color:#fca5a5;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}

/* IMAGE UPLOAD PREVIEW */
.img-preview-wrap{display:flex;gap:8px;align-items:center;background:var(--surface);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.img-preview-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover}
.img-preview-name{font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-preview-del{background:none;border:none;color:#dc2626;cursor:pointer;font-size:14px;flex-shrink:0}

/* FULLSCREEN */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--surface)}
.overlay.show{display:flex;flex-direction:column}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:22px 22px 0 0;padding:22px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.modal-hdr{font-size:16px;font-weight:600;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--surface);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px}

/* STATUS */
.dot{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px}
.dot-ok{background:#d1fae5;color:#065f46}
.dot-err{background:#fee2e2;color:#991b1b}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--brand);color:#fff;padding:9px 18px;border-radius:30px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* UTILS */
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:14px}
.mt8{margin-top:8px}.mt12{margin-top:12px}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:12px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<!-- NAV -->
<nav class="tabs" id="nav">
  <div class="tab active" data-p="wa" onclick="goPage('wa')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 20l1.5-5.5A8.5 8.5 0 1 1 9 18.5L3 20z"/></svg>话术
  </div>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 8h14M5 12h14M5 16h6"/><circle cx="17" cy="16" r="3"/><path d="m15.5 17.5 3 3"/></svg>翻译
  </div>

  </div>
  <div class="tab" data-p="cfg" onclick="goPage('cfg')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v3m0 16v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M1 12h3m16 0h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>设置
  </div>
</nav>

<!-- ══ PAGE: 话术 ══ -->
<div id="page-wa" class="page active">
  <div class="card">
    <div class="card-title">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#25D366"><path d="M3 20l1.5-5.5A8.5 8.5 0 1 1 9 18.5L3 20z"/></svg>
      选择话术模板
    </div>
    <div class="tpl-grid" id="tplGrid"></div>
  </div>
  <div class="card" id="tplEditor" style="display:none">
    <div class="card-title">✏️ 填写内容</div>
    <div id="tplFields"></div>
  </div>
  <div class="card" id="tplPreview" style="display:none">
    <div class="card-title">👁️ 预览 & 发送</div>
    <div class="wa-mock">
      <div class="wa-header">
        <div class="wa-avatar">👤</div>
        <div><div id="prevContact">客户</div><div style="font-size:11px;opacity:.8">WhatsApp</div></div>
      </div>
      <div class="wa-bubble" id="prevText"></div>
      <div class="wa-time" id="prevTime"></div>
      <div id="zhRefWrap" style="display:none">
        <div class="zh-ref-label">📖 中文参考（你说的意思）</div>
        <div class="zh-ref" id="zhRefText"></div>
      </div>
    </div>
    <div class="mt12">
      <div class="field">
        <label>WhatsApp 号码（含区号）</label>
        <input type="tel" id="waPhone" placeholder="+57 300 000 0000">
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="copyMsg()">📋 复制</button>
        <button class="btn btn-wa" onclick="sendWa()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M3 20l1.5-5.5A8.5 8.5 0 1 1 9 18.5L3 20z"/></svg>
          WhatsApp 发送
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 翻译 ══ -->
<div id="page-tr" class="page">
  <div class="card">
    <!-- 多语言选择 -->
    <div class="lang-row">
      <select id="srcLangSel" class="lang-select" onchange="onLangChange()">
        <option value="zh">🇨🇳 中文</option>
        <option value="es">🇪🇸 Español</option>
        <option value="en">🇬🇧 English</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
      <div class="swap-btn" onclick="swapLang()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
      </div>
      <select id="tgtLangSel" class="lang-select" onchange="onLangChange()">
        <option value="es">🇪🇸 Español</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="en">🇬🇧 English</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
    </div>
    <div class="field" style="display:flex;gap:8px;align-items:flex-start">
      <textarea id="srcText" placeholder="输入或语音输入..." rows="4" oninput="onSrcInput()" style="flex:1"></textarea>
      <div class="dual-mic">
        <button class="dual-mic-btn" id="trMicSrc" onclick="startVoice('tr', getSrcLang(), 'trMicSrc')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>
          <span id="trMicSrcLabel">🇨🇳</span>
        </button>
        <button class="dual-mic-btn" id="trMicTgt" onclick="startVoice('tr', getTgtLang(), 'trMicTgt')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>
          <span id="trMicTgtLabel">🇪🇸</span>
        </button>
      </div>
    </div>
    <button class="btn btn-blue" onclick="doTranslate()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 8h14M5 12h14M5 16h6"/><circle cx="17" cy="16" r="3"/><path d="m15.5 17.5 3 3"/></svg>
      立即翻译
    </button>
    <div id="trResult" style="display:none;margin-top:13px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:5px">翻译结果</div>
      <div class="trans-out" id="trOut"></div>
      <div class="trans-actions">
        <button class="btn btn-ghost btn-sm" onclick="copyTrans()">📋 复制</button>
        <button class="btn btn-ghost btn-sm" onclick="speak(document.getElementById('trOut').textContent, getTgtLang())">🔊 朗读</button>
        <button class="btn btn-wa btn-sm" onclick="sendTransWa()">WhatsApp</button>
        <button class="btn btn-ghost btn-sm" onclick="sendToChat()">💬 发到聊天</button>
      </div>
    </div>
  </div>

  <!-- 快速短语 -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      ⚡ 快速短语
      <button class="btn btn-ghost btn-sm" onclick="openAddPhrase()" style="margin-left:auto">＋ 添加</button>
    </div>
    <div class="phrases-grid" id="phrases"></div>
  </div>
</div>

<!-- ══ PAGE: 管理 ══ -->
<div id="page-mgr" class="page">
  <div class="card">

<script>
// ══ CONSTANTS ══
const CHAT_URL = 'https://pro-excavator.github.io/translator-chat/index.html';
const clientId = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);

// 语言配置
const LANGS = {
  zh: { name:'中文', flag:'🇨🇳', voice:'zh-CN' },
  es: { name:'Español', flag:'🇪🇸', voice:'es-ES' },
  en: { name:'English', flag:'🇬🇧', voice:'en-US' },
  pt: { name:'Português', flag:'🇧🇷', voice:'pt-BR' },
  fr: { name:'Français', flag:'🇫🇷', voice:'fr-FR' },
  ar: { name:'العربية', flag:'🇸🇦', voice:'ar-SA' },
};

let srcCode = 'zh', tgtCode = 'es';
let selectedTpl = null, transText = '';
let adminRoomId = null, adminMsgUnsub = null;
let clientRoomId = null, clientMsgUnsub = null, clientRoomUnsub = null;
let roomsUnsub = null, editingId = null;
let adminImgFile = null;

// 语音
let vRec = null, vTarget = null, vBtnId = null, vActive = false;

// ══ UTILS ══
const esc = s => s ? s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : '';
const now = () => { const d=new Date(); return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); };
const isChinese = t => /[\u4e00-\u9fa5]/.test(t);

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ LANG HELPERS ══
function getSrcLang(){ return LANGS[srcCode]?.voice || 'zh-CN'; }
function getTgtLang(){ return LANGS[tgtCode]?.voice || 'es-ES'; }

function onLangChange(){
  srcCode = document.getElementById('srcLangSel').value;
  tgtCode = document.getElementById('tgtLangSel').value;
  // 更新麦克风标签
  document.getElementById('trMicSrcLabel').textContent = LANGS[srcCode]?.flag || '🎤';
  document.getElementById('trMicTgtLabel').textContent = LANGS[tgtCode]?.flag || '🎤';
}

function swapLang(){
  const tmp = srcCode; srcCode = tgtCode; tgtCode = tmp;
  document.getElementById('srcLangSel').value = srcCode;
  document.getElementById('tgtLangSel').value = tgtCode;
  onLangChange();
  const oldSrc = document.getElementById('srcText').value;
  document.getElementById('srcText').value = transText;
  transText = oldSrc;
  document.getElementById('trOut').textContent = transText;
}

// ══ TRANSLATE API ══
async function xlate(text, from, to){
  if(!text || !text.trim() || from===to) return text;
  try{
    const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const d = await r.json();
    return (d.responseData?.translatedText||text).replace(/\[[a-z]{2}\]/gi,'').trim();
  }catch(e){ return text; }
}

// 自动检测：中文→西班牙语，否则→中文（聊天室默认逻辑）
async function autoXlate(text){
  if(isChinese(text)) return { trans: await xlate(text,'zh','es'), arrow:'📖 ES: ' };
  else return { trans: await xlate(text,'es','zh'), arrow:'📖 ZH: ' };
}

// ══ TTS ══
function speak(text, langCode){
  if(!text||!text.trim()) return;
  window.speechSynthesis.cancel();
  const lang = langCode || (isChinese(text) ? 'zh-CN' : 'es-ES');
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang; utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

// ══ PAGE NAV ══
function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector(`[data-p="${id}"]`).classList.add('active');
  if(id==='mgr') initMgr();
}

// ══ VOICE ══
function startVoice(target, lang, btnId){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    toast('请用 Chrome 或系统浏览器，微信不支持语音');return;
  }
  if(vActive&&vTarget===target&&vBtnId===btnId){ vRec&&vRec.stop(); return; }
  if(vActive){ vRec&&vRec.stop(); }
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  vRec=new SR(); vTarget=target; vBtnId=btnId;
  vRec.lang=lang; vRec.continuous=false; vRec.interimResults=true;
  vRec.onstart=()=>{ vActive=true; document.getElementById(btnId)?.classList.add('rec'); toast('🎤 录音中...'); };
  vRec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    if(target==='tr') document.getElementById('srcText').value=t;
    else if(target==='admin') document.getElementById('adminIn').value=t;
    else document.getElementById('clientIn').value=t;
  };
  vRec.onend=()=>{
    vActive=false; document.getElementById(btnId)?.classList.remove('rec');
    if(target==='tr') onSrcInput();
    if(target==='admin') onAdminIn();
  };
  vRec.onerror=e=>{
    vActive=false; document.getElementById(btnId)?.classList.remove('rec');
    if(e.error==='not-allowed') toast('❌ 请允许麦克风权限');
    else if(e.error==='no-speech') toast('没听到声音，请重试');
    else toast('语音错误: '+e.error);
  };
  vRec.start();
}

function selectTpl(id){
  selectedTpl = allTpls().find(t=>t.id===id);
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('tc_'+id)?.classList.add('sel');

      <div class="field"><label>发送语言</label>

          <option value="es">Español</option><option value="zh">中文</option>
          <option value="en">English</option><option value="pt">Português</option>

      <div class="field"><label>发送语言</label>

        <div class="field"><label>${esc(f.l)}</label>
          <input id="f_${f.k}" placeholder="${esc(f.p)}" oninput="updatePrev()"></div>`).join('')}`;
    preview.style.display='block'; updatePrev();
  }
}

async function updatePrev(){
  if(!selectedTpl) return;
  let lang = document.getElementById('tplLang')?.value||'es';
  let body, zhBody, contact;
  if(selectedTpl.id==='free'){
    body = document.getElementById('freeBody')?.value||'';
    contact = document.getElementById('freeContact')?.value||'客户';
    zhBody = lang==='es' ? await xlate(body,'es','zh') : body;
  } else {
    body = selectedTpl.langs[lang]||selectedTpl.langs['es']||'';
    zhBody = selectedTpl.langs['zh']||'';
    contact = document.getElementById('f_name')?.value||'客户';
    (selectedTpl.fields||[]).forEach(f=>{
      const v = document.getElementById('f_'+f.k)?.value||f.p;
      body = body.replace(new RegExp('{'+f.k+'}','g'),v);
      zhBody = zhBody.replace(new RegExp('{'+f.k+'}','g'),v);
    });
  }
  document.getElementById('prevContact').textContent = contact;
  document.getElementById('prevText').textContent = body;
  document.getElementById('prevTime').textContent = now();
  const wrap = document.getElementById('zhRefWrap');
  if(lang!=='zh' && zhBody){ document.getElementById('zhRefText').textContent=zhBody; wrap.style.display='block'; }
  else wrap.style.display='none';
}

}

// ══ TRANSLATOR ══
function getCustomPhrases(){ try{return JSON.parse(localStorage.getItem('phrases')||'[]');}catch(e){return[];} }
function saveCustomPhrases(a){ localStorage.setItem('phrases',JSON.stringify(a)); }

const DEFAULT_PHRASES = [
  {zh:'我马上到',es:'Ya voy en camino'},
  {zh:'等一下',es:'Un momento, por favor'},
  {zh:'多少钱？',es:'¿Cuánto cuesta?'},
  {zh:'能打折吗？',es:'¿Me puede dar un descuento?'},
  {zh:'太贵了',es:'Es muy caro'},
  {zh:'好的，同意',es:'Sí, de acuerdo'},
  {zh:'明天联系',es:'Le contacto mañana'},
  {zh:'我们质量有保证',es:'Garantizamos la calidad'},
];

function renderPhrases(){
  const custom = getCustomPhrases();
  const all = [...DEFAULT_PHRASES.map(p=>({...p,_builtin:true})), ...custom];
  document.getElementById('phrases').innerHTML = all.map((p,i)=>`
    <div class="phrase-card" onclick="quickPhrase('${esc(p.zh)}','${esc(p.es)}')">
      ${!p._builtin ? `<button class="phrase-del" onclick="event.stopPropagation();deletePhrase(${i - DEFAULT_PHRASES.length})">✕</button>` : ''}
      <div class="phrase-zh">${esc(p.zh)} <span class="phrase-speak" onclick="event.stopPropagation();speak('${esc(p.zh)}','zh-CN')">🔊</span></div>
      <div class="phrase-es">${esc(p.es)} <span class="phrase-speak" onclick="event.stopPropagation();speak('${esc(p.es)}','es-ES')">🔊</span></div>
    </div>`).join('');
}

function quickPhrase(zh, es){
  document.getElementById('srcText').value = zh;
  transText = es;
  document.getElementById('trOut').textContent = es;
  document.getElementById('trResult').style.display = 'block';
}

function openAddPhrase(){ document.getElementById('phraseModalBg').classList.add('show'); }
function closePhraseModal(){ document.getElementById('phraseModalBg').classList.remove('show'); }

function savePhrase(){
  const zh = document.getElementById('pZh').value.trim();
  const es = document.getElementById('pEs').value.trim();
  if(!zh||!es){toast('请填写中文和西班牙语');return;}
  const arr = getCustomPhrases();
  arr.push({zh,es});
  saveCustomPhrases(arr);
  document.getElementById('pZh').value='';
  document.getElementById('pEs').value='';
  closePhraseModal();
  renderPhrases();
  toast('✅ 短语已添加');
}

function deletePhrase(i){
  const arr = getCustomPhrases();
  arr.splice(i,1);
  saveCustomPhrases(arr);
  renderPhrases();
}

async function doTranslate(){
  const text = document.getElementById('srcText').value.trim();
  if(!text){toast('请输入文字');return;}
  document.getElementById('trOut').textContent='翻译中...';
  document.getElementById('trResult').style.display='block';
  transText = await xlate(text, srcCode, tgtCode);
  document.getElementById('trOut').textContent = transText;
}

let srcTimer;
function onSrcInput(){ clearTimeout(srcTimer); srcTimer=setTimeout(doTranslate,900); }
function copyTrans(){ navigator.clipboard.writeText(transText); toast('✅ 已复制'); }
function sendTransWa(){
  const phone = prompt('输入 WhatsApp 号码（含区号）')||'';
  if(!phone) return;
  window.open(`https://wa.me/${phone.replace(/\s+/g,'').replace(/^\+/,'')}?text=${encodeURIComponent(transText)}`,'_blank');
}
function sendToChat(){
  if(!clientRoomId){toast('请先进入聊天室');return;}
  sendClient(transText);
}

// ══ ADMIN: ROOMS ══
function initMgr(){
  if(roomsUnsub) roomsUnsub();
  roomsUnsub = db.collection('customerRooms').orderBy('createdAt','desc').onSnapshot(snap=>{
    const rooms = snap.docs.map(d=>({id:d.id,...d.data()}));
    const el = document.getElementById('roomList');
    if(!rooms.length){el.innerHTML='<div class="empty">暂无聊天室</div>';return;}
    el.innerHTML = rooms.map(r=>{
      const isOn = r.isOpen||false;
      const link = r.roomLink||`${CHAT_URL}#${r.roomId}`;
      return `<div class="room-item">
        <div class="room-hdr">
          <div class="room-name">👤 ${esc(r.clientName)}</div>
          <div class="toggle-pill" onclick="toggleRoom('${r.roomId}',${isOn})">
            <span class="badge ${isOn?'badge-on':'badge-off'}">${isOn?'开启中':'已关闭'}</span>
            <div class="pill ${isOn?'on':''}"></div>
          </div>
        </div>
        <div class="room-link">🔗 ${esc(link)}</div>
        <div class="room-acts">
          <button class="btn btn-ghost btn-sm" onclick="copyLink('${esc(link)}')">📋 复制链接</button>
          <button class="btn btn-blue btn-sm" onclick="openAdminChat('${r.roomId}','${esc(r.clientName)}')">💬 进入聊天</button>
          <button class="btn btn-red btn-sm" onclick="delRoom('${r.roomId}','${esc(r.clientName)}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
  });
}

async function createRoom(){
  const name = document.getElementById('newName').value.trim();
  if(!name){toast('请输入客户姓名');return;}
  const roomId = 'room_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  const link = `${CHAT_URL}#${roomId}`;
  try{
    await db.collection('customerRooms').doc(roomId).set({
      roomId, clientName:name,
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      isOpen:false, roomLink:link
    });
    document.getElementById('newName').value='';
    navigator.clipboard.writeText(link);
    toast('✅ 已创建并复制链接');
  }catch(e){toast('❌ 创建失败:'+e.message.substring(0,40));}
}

async function toggleRoom(id,cur){
  try{await db.collection('customerRooms').doc(id).update({isOpen:!cur});}
  catch(e){toast('❌ '+e.message.substring(0,40));}
}

async function delRoom(id,name){
  if(!confirm(`删除「${name}」的房间？`)) return;
  try{await db.collection('customerRooms').doc(id).delete();}
  catch(e){toast('❌ '+e.message.substring(0,40));}
}

function copyLink(link){ navigator.clipboard.writeText(link); toast('✅ 已复制链接'); }

// ══ IMAGE UPLOAD ══
let adminImgData = null;

function onAdminImgPick(input){
  const file = input.files[0]; if(!file) return;
  adminImgFile = file;
  const reader = new FileReader();
  reader.onload = e=>{
    adminImgData = e.target.result;
    document.getElementById('adminImgThumb').src = adminImgData;
    document.getElementById('adminImgName').textContent = file.name;
    document.getElementById('adminImgPreview').style.display='flex';
  };
  reader.readAsDataURL(file);
}

function clearAdminImg(){
  adminImgFile=null; adminImgData=null;
  document.getElementById('adminImgPreview').style.display='none';
  document.getElementById('adminImgInput').value='';
}

async function uploadImg(file){
  // 用 base64 存到 Firestore（小图片），大图用 Storage
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function sendClientImg(input){
  const file = input.files[0]; if(!file||!clientRoomId) return;
  toast('📤 上传中...');
  const dataUrl = await uploadImg(file);
  await db.collection('customerRooms').doc(clientRoomId).collection('messages').add({
    role:'client', senderId:clientId, type:'image',
    originalText:'[图片]', translatedText:'[Imagen]',
    imageData:dataUrl, timestamp:new Date()
  });
  input.value='';
  toast('✅ 图片已发送');
}

// ══ ADMIN CHAT ══
function openAdminChat(roomId, clientName){
  adminRoomId = roomId;
  chatLog.admin = [];
  document.getElementById('adminChatTitle').textContent = '👤 '+clientName;
  document.getElementById('adminChat').classList.add('show');
  document.getElementById('adminMsgs').innerHTML='';
  if(adminMsgUnsub) adminMsgUnsub();
  adminMsgUnsub = db.collection('customerRooms').doc(roomId).collection('messages')
    .orderBy('timestamp','asc').onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          const d = ch.doc.data();
          chatLog.admin.push(d);
          addBubble(d,'adminMsgs',true);
        }
      });
    });
}

let adminTimer;
function onAdminIn(){
  const t = document.getElementById('adminIn').value.trim();
  const prev = document.getElementById('adminPrev');
  if(!t){prev.style.display='none';return;}
  prev.style.display='block';
  document.getElementById('adminPrevText').textContent='翻译中...';
  clearTimeout(adminTimer);
  adminTimer = setTimeout(async()=>{
    const {trans} = await autoXlate(t);
    document.getElementById('adminPrevText').textContent = trans;
  },600);
}

async function sendAdmin(){
  // 如果有图片待发
  if(adminImgData && adminRoomId){
    await db.collection('customerRooms').doc(adminRoomId).collection('messages').add({
      role:'admin', senderId:'admin', type:'image',
      originalText:'[图片]', translatedText:'[Imagen]',
      imageData:adminImgData, timestamp:new Date()
    });
    clearAdminImg();
  }
  const t = document.getElementById('adminIn').value.trim();
  if(!t||!adminRoomId) return;
  document.getElementById('adminIn').value='';
  document.getElementById('adminPrev').style.display='none';
  const {trans} = await autoXlate(t);
  await db.collection('customerRooms').doc(adminRoomId).collection('messages').add({
    role:'admin', originalText:t, translatedText:trans, senderId:'admin', timestamp:new Date()
  });
}

function closeAdminChat(){
  document.getElementById('adminChat').classList.remove('show');
  if(adminMsgUnsub) adminMsgUnsub();
}

// ══ CLIENT CHAT ══
function goClientChat(){
  let input = document.getElementById('clientLink').value.trim();
  let roomId = input.includes('#') ? input.split('#')[1] : input;
  const m = roomId.match(/room_\d+_[a-z0-9]+/);
  if(m) roomId = m[0];
  if(!roomId||!roomId.startsWith('room_')){toast('无效链接格式');return;}
  openClientChat(roomId);
}

function openClientChat(roomId){
  clientRoomId = roomId;
  chatLog.client = [];
  document.getElementById('clientChat').classList.add('show');
  document.getElementById('clientMsgs').innerHTML='';
  addSys(document.getElementById('clientMsgs'),'🔗 正在连接...');
  if(clientRoomUnsub) clientRoomUnsub();
  clientRoomUnsub = db.collection('customerRooms').doc(roomId).onSnapshot(doc=>{
    if(!doc.exists){addSys(document.getElementById('clientMsgs'),'❌ 房间不存在');return;}
    const on = doc.data().isOpen||false;
    document.getElementById('clientIn').disabled = !on;
    document.getElementById('clientSend').disabled = !on;
    document.getElementById('clientStatus').textContent = on?'🟢 对话已开启':'🔴 等待客服开启';
  });
  if(clientMsgUnsub) clientMsgUnsub();
  clientMsgUnsub = db.collection('customerRooms').doc(roomId).collection('messages')
    .orderBy('timestamp','asc').onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          const d = ch.doc.data();
          chatLog.client.push(d);
          addBubble(d,'clientMsgs',false);
        }
      });
    });
}

async function sendClient(overrideText){
  const t = overrideText||document.getElementById('clientIn').value.trim();
  if(!t||!clientRoomId) return;
  if(!overrideText) document.getElementById('clientIn').value='';
  const {trans} = await autoXlate(t);
  await db.collection('customerRooms').doc(clientRoomId).collection('messages').add({
    role:'client', senderId:clientId, originalText:t, translatedText:trans, timestamp:new Date()
  });
}

function closeClientChat(){
  document.getElementById('clientChat').classList.remove('show');
  if(clientMsgUnsub) clientMsgUnsub();
  if(clientRoomUnsub) clientRoomUnsub();
}

// ══ BUBBLE RENDERER ══
function addBubble(d, listId, isAdminView){
  const isAdmin = d.role==='admin';
  const isMe = isAdminView ? isAdmin : !isAdmin;
  const el = document.createElement('div');
  el.className = 'msg '+(isMe?'me':'them');

  const senderLabel = isAdminView
    ? (isAdmin ? '🧑\u200d💼 我' : '👤 客户')
    : (isAdmin ? '🧑\u200d💼 客服' : '👤 我');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const sender = document.createElement('div');
  sender.className = 'b-sender';
  sender.textContent = senderLabel;
  bubble.appendChild(sender);

  // 图片消息
  if(d.type==='image' && d.imageData){
    const img = document.createElement('img');
    img.className = 'b-img';
    img.src = d.imageData;
    img.onclick = ()=>openLightbox(d.imageData);
    bubble.appendChild(img);
  } else {
    const mainText = document.createElement('div');
    mainText.className = 'b-text';
    mainText.textContent = d.originalText||'';
    mainText.onclick = function(){ speak(d.originalText||''); };
    bubble.appendChild(mainText);

    if(d.translatedText && d.translatedText!=='[Imagen]'){
      const isSrcChinese = isChinese(d.originalText||'');
      const arrow = isSrcChinese ? '📖 ES: ' : '📖 ZH: ';
      const trans = document.createElement('div');
      trans.className = 'b-trans';
      trans.textContent = arrow + d.translatedText + ' 🔊';
      trans.onclick = function(){ speak(d.translatedText||''); };
      bubble.appendChild(trans);
    }
  }

  const timeEl = document.createElement('div');
  timeEl.className = 'b-time';
  timeEl.textContent = now();
  bubble.appendChild(timeEl);

  el.appendChild(bubble);
  const list = document.getElementById(listId);
  list.appendChild(el);
  list.scrollTop = list.scrollHeight;
}

function addSys(container, msg){
  const el = document.createElement('div');
  el.className = 'sys-msg'; el.textContent = msg;
  container.appendChild(el);
}

// ══ 导出聊天记录 ══
function exportChat(role){
  const logs = chatLog[role];
  if(!logs||!logs.length){toast('暂无聊天记录');return;}

  const title = role==='admin'
    ? document.getElementById('adminChatTitle').textContent
    : '客户聊天记录';

  let text = `${title}\n导出时间：${new Date().toLocaleString()}\n${'─'.repeat(40)}\n\n`;
  logs.forEach(d=>{
    if(d.type==='image'){
      text += `[${d.role==='admin'?'客服':'客户'}] [图片]\n`;
    } else {
      const sender = d.role==='admin'?'客服':'客户';
      text += `[${sender}] ${d.originalText||''}\n`;
      if(d.translatedText) text += `  翻译：${d.translatedText}\n`;
    }
    text += '\n';
  });

  // 下载为 txt
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `聊天记录_${Date.now()}.txt`;
  a.click(); URL.revokeObjectURL(url);
  toast('✅ 已导出聊天记录');
}

function closeLightbox(){

// ══ TEMPLATE MODAL ══
function openEditTpl(id){
  const tpl = allTpls().find(t=>t.id===id); if(!tpl) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑：'+tpl.name;
  document.getElementById('mName').value = tpl.name;
  document.getElementById('mIcon').value = tpl.icon;
  document.getElementById('mZh').value = tpl.langs.zh||'';
  document.getElementById('mEs').value = tpl.langs.es||'';
  document.getElementById('mFields').value = (tpl.fields||[]).map(f=>`${f.k}|${f.l}|${f.p}`).join('\n');
  document.getElementById('modalBg').classList.add('show');
}

function openAddTpl(){
  editingId='__new__';
  document.getElementById('modalTitle').textContent='新建模板';
  ['mName','mZh','mEs','mFields'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mIcon').value='📝';
  document.getElementById('mFields').value='name|客户姓名|Sr. García';
  document.getElementById('modalBg').classList.add('show');
}

function closeModal(){ document.getElementById('modalBg').classList.remove('show'); editingId=null; }

function saveModal(){
  const name = document.getElementById('mName').value.trim();
  if(!name){toast('请填写名称');return;}
  const icon = document.getElementById('mIcon').value.trim()||'📝';
  const zh = document.getElementById('mZh').value;
  const es = document.getElementById('mEs').value;
  const fields = (document.getElementById('mFields').value.trim()||'').split('\n').filter(l=>l.trim()).map(l=>{
    const[k,label,p]=l.split('|');
    return{k:(k||'').trim(),l:(label||k||'').trim(),p:(p||'').trim()};
  }).filter(f=>f.k);

  if(editingId==='__new__'){
    const arr = getCustom();
    arr.push({id:'ct_'+Date.now(),icon,name,desc:'自定义',langs:{zh,es},fields});
    saveCustom(arr);
  } else {
    const b = BUILTIN.find(t=>t.id===editingId);
    if(b){ Object.assign(b,{name,icon,langs:{zh,es},fields}); }
    else{
      const arr = getCustom(), i = arr.findIndex(t=>t.id===editingId);
      if(i>=0){arr[i]={...arr[i],name,icon,langs:{zh,es},fields};saveCustom(arr);}
    }
  }
  closeModal(); renderTpls(); renderCustomList(); toast('✅ 已保存');
}

function renderCustomList(){
  const arr = getCustom();
  document.getElementById('customList').innerHTML = arr.length
    ? arr.map((t,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${esc(t.icon)} ${esc(t.name)}</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="openEditTpl('${t.id}')">✏️</button>
          <button class="btn btn-red btn-sm" onclick="delCustom(${i})">删除</button>
        </div>
      </div>`).join('')
    : '<div style="font-size:13px;color:var(--muted)">暂无自定义模板</div>';
}

function delCustom(i){ const a=getCustom();a.splice(i,1);saveCustom(a);renderTpls();renderCustomList(); }

// ══ INIT ══
function init(){
  // 恢复模板覆盖
  const ov = JSON.parse(localStorage.getItem('tplOverrides')||'{}');
  Object.entries(ov).forEach(([id,data])=>{
    const tpl = BUILTIN.find(t=>t.id===id);
    if(tpl) Object.assign(tpl,data);
  });

  renderTpls();
  renderPhrases();
  renderCustomList();
  onLangChange();

  const hash = location.hash.substring(1);
  if(hash && hash.startsWith('room_')){
    document.getElementById('nav').style.display='none';
    openClientChat(hash);
  }
}

init();
